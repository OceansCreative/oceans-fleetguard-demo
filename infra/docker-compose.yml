name: fleetguard

# One-command stack: PostgreSQL + Traccar + backend + frontend.
# Defaults run in mock mode, so the dashboard works without a real Traccar feed.
# Copy ../.env.example to ../.env to override any value.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-traccar}
      POSTGRES_USER: ${POSTGRES_USER:-traccar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-traccar}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-traccar}"]
      interval: 10s
      timeout: 5s
      retries: 5

  traccar:
    image: traccar/traccar:latest
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8082:8082" # web / REST API
      - "5055:5055" # OsmAnd device protocol
    restart: unless-stopped

  backend:
    build:
      context: ../backend
    environment:
      MOCK_MODE: ${MOCK_MODE:-true}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      TRACCAR_BASE_URL: ${TRACCAR_BASE_URL:-http://traccar:8082}
    ports:
      - "8000:8000"
    depends_on:
      - traccar

  frontend:
    build:
      context: ../frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_BASE_URL: ${NEXT_PUBLIC_WS_BASE_URL:-ws://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
