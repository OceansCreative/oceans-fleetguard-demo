name: 🐛 Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for filing a bug! Please fill in the details below.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I ..., the dashboard ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `docker compose ... up`
        2. Open http://localhost:3000
        3. ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - frontend (Next.js)
        - backend (FastAPI)
        - theft-detection
        - infra / docker-compose
        - docs
        - other
    validations:
      required: true
  - type: input
    id: mode
    attributes:
      label: Mode
      description: MOCK_MODE value, or "live Traccar".
      placeholder: MOCK_MODE=true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, Node/Python versions, Docker version.
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste logs (redact any secrets).
      render: shell
